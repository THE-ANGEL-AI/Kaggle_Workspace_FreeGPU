name: Deploy GitHub Pages

# Ветка `site` — единственный источник правды для React-сайта.
# Ветка `main` — только Kaggle-скрипты, не содержит src/ и не должна триггерить
# никаких сборок. Меняешь instal/ / workflows/ / Notebook/ в main → пуш идёт
# без пересборки Vite (экономит минуты CI и не дёргает GH Pages зря).
on:
  push:
    branches: [ site ]
  # Ручной запуск из вкладки Actions — на случай форсированного деплоя.
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Один деплой за раз — второй отменяет первый.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20 LTS
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'           # авто-кеш ~/.npm по package-lock.json

      - name: Install dependencies
        run: npm ci --no-fund --no-audit

      - name: Build (Vite → docs-site/dist)
        # Вывод кладём в docs-site/dist, чтобы доставить ассеты
        # ровно туда, откуда upload-pages-artifact@v3 их потом заберёт.
        run: npm run build
        env:
          CI: 'true'              # подавляет Vite dev-only логи

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs-site/dist

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
